<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Paper Console AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #gameCanvas { display: none; }
    #ui { position: fixed; top: 16px; right: 16px; color: white; font: bold 22px Arial; text-shadow: 0 0 8px rgba(0,0,0,0.9); z-index: 999; }
    #status { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); color: white; font: 14px Arial; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px; z-index: 999; text-align: center; transition: opacity 0.4s; }
    #btn-debug { position: fixed; top: 16px; left: 16px; background: rgba(0,0,0,0.7); color: #7DF9B0; font: 12px monospace; padding: 8px 12px; border-radius: 8px; z-index: 999; display: none; }
  </style>
</head>
<body>

  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <div id="ui"><span id="score">Score: 0</span></div>
  <div id="status">📷 Apunta la cámara al papel...</div>
  <div id="btn-debug">Iniciando detector...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes; uiError: yes; filterMinCF: 0.1; filterBeta: 1000;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <canvas id="arCanvas" width="800" height="400"></canvas>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane id="game-plane" position="0 0 0.001" rotation="0 0 0" width="1.4" height="0.7"
        material="shader: flat; src: #arCanvas; transparent: false">
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
  class Game {
    constructor() {
      this.canvas = document.getElementById('gameCanvas');
      this.ctx    = this.canvas.getContext('2d');
      this.canvas.width  = 800;
      this.canvas.height = 400;
      this.gameRunning = true;
      this.gamePaused  = true;
      this.score = 0;
      this.player = {
        x: 80, y: 0, vy: 0, vx: 0,
        gravity: 1.2, jumpForce: -22,
        ground: this.canvas.height - 50,
        drawW: 220, jumping: false, spriteHeight: 0
      };
      this.obstacles = []; this.obstacleTimer = 0; this.obstacleCooldown = 120;
      this.frame = 0; this.timer = 0; this.jumpFrame = 0; this.jumpTimer = 0;
      this.bgX = 0; this.mid1AX = 0; this.mid1BX = 0; this.mid2X = 0; this.fgX = 0;
      this.loadImages();
    }

    loadImages() {
      this.images = {
        run: new Image(), jump: new Image(),
        background: new Image(), midground: new Image(),
        midground2: new Image(), foreground: new Image()
      };
      this.images.run.src        = 'assets/run.png';
      this.images.jump.src       = 'assets/jump.png';
      this.images.background.src = 'assets/background.png';
      this.images.midground.src  = 'assets/midground.png';
      this.images.midground2.src = 'assets/midground.png';
      this.images.foreground.src = 'assets/foreground.png';
      let loaded = 0;
      const total = Object.keys(this.images).length;
      Object.values(this.images).forEach(img => {
        img.onload  = () => {
          if (++loaded === total) {
            // Controles — se registran solo cuando todas las imagenes cargaron
            document.addEventListener('keydown', (e) => { if (e.code === 'Space') this.jump(); });
            document.addEventListener('click',      () => this.jump());
            document.addEventListener('touchstart', () => this.jump());
            this.gameLoop();
          }
        };
        img.onerror = () => console.error('Error:', img.src);
      });
    }

    jump() {
      if (!this.player.jumping && !this.gamePaused && this.gameRunning) {
        this.player.vy = this.player.jumpForce;
        this.player.jumping = true;
      }
    }

    checkCollision(p, obs) {
      const img = p.jumping ? this.images.jump : this.images.run;
      const fc  = p.jumping ? 8 : 6;
      let sh, sy;
      if (img.complete && img.width > 0) {
        const fw = img.width / fc;
        const sc = p.drawW / fw;
        sh = img.height * sc; sy = p.y - sh;
      } else { sh = 130; sy = p.y - 130; }
      const mx = p.jumping ? 70 : 20, my = p.jumping ? 5 : 10;
      return p.x + mx < obs.x + obs.width &&
             p.x + p.drawW - mx > obs.x &&
             sy + my < obs.y + obs.height &&
             sy + sh - my > obs.y;
    }

    update() {
      if (this.gamePaused || !this.gameRunning) return;
      this.player.vy += this.player.gravity;
      this.player.y  += this.player.vy;
      this.player.x  += this.player.vx;
      this.player.vx *= 0.95;
      if (this.player.y >= this.player.ground) {
        this.player.y = this.player.ground;
        this.player.vy = 0; this.player.vx = 0; this.player.jumping = false;
      }
      if (this.player.x > this.canvas.width - 150) this.player.x = this.canvas.width - 150;
      if (this.player.jumping) {
        if (++this.jumpTimer > 5) { this.jumpFrame = (this.jumpFrame + 1) % 8; this.jumpTimer = 0; }
      } else {
        if (++this.timer > 4) { this.frame = (this.frame + 1) % 6; this.timer = 0; }
      }
      if (++this.obstacleTimer > this.obstacleCooldown) {
        this.obstacles.push({ x: this.canvas.width, y: this.player.ground - 50, width: 40, height: 50 });
        this.obstacleTimer = 0;
        this.obstacleCooldown = Math.max(80, this.obstacleCooldown - 1);
      }
      for (let i = this.obstacles.length - 1; i >= 0; i--) {
        this.obstacles[i].x -= 8;
        if (this.obstacles[i].x < -50) { this.obstacles.splice(i, 1); this.score += 10; }
        else if (this.checkCollision(this.player, this.obstacles[i])) this.gameOver();
      }
      this.bgX -= 1;   if (this.bgX   <= -this.canvas.width) this.bgX   = 0;
      this.mid1AX -= 4; if (this.mid1AX <= -this.canvas.width) this.mid1AX = this.canvas.width;
      this.mid1BX -= 4; if (this.mid1BX <= -this.canvas.width) this.mid1BX = this.canvas.width;
      this.mid2X  -= 4; if (this.mid2X  <= -this.canvas.width) this.mid2X  = 0;
      this.fgX    -= 5; if (this.fgX    <= -this.canvas.width) this.fgX    = 0;
      this.score++;
    }

    draw() {
      const c = this.ctx;
      c.fillStyle = '#87CEEB';
      c.fillRect(0, 0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.background, this.bgX,                  0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.background, this.bgX + this.canvas.width, 0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.midground,  this.mid1AX,               0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.midground,  this.mid1BX,               0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.midground2, this.mid2X,                0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.midground2, this.mid2X + this.canvas.width, 0, this.canvas.width, this.canvas.height);

      const img = this.player.jumping ? this.images.jump : this.images.run;
      const fi  = this.player.jumping ? this.jumpFrame   : this.frame;
      const fc  = this.player.jumping ? 8 : 6;
      if (img.complete && img.width > 0) {
        const fw = img.width / fc, sc = this.player.drawW / fw;
        const dh = img.height * sc, dy = this.player.y - dh;
        this.player.spriteHeight = dh; this.player.spriteY = dy;
        c.drawImage(img, fi * fw, 0, fw, img.height, this.player.x, dy, this.player.drawW, dh);
      }

      c.fillStyle = '#FF6B3D';
      for (const obs of this.obstacles) c.fillRect(obs.x, obs.y, obs.width, obs.height);

      c.drawImage(this.images.foreground, this.fgX,                0, this.canvas.width, this.canvas.height);
      c.drawImage(this.images.foreground, this.fgX + this.canvas.width, 0, this.canvas.width, this.canvas.height);

      const ar = document.getElementById('arCanvas');
      if (ar) ar.getContext('2d').drawImage(this.canvas, 0, 0);
      document.getElementById('score').textContent = 'Score: ' + Math.floor(this.score / 10);
    }

    gameOver() {
      this.gameRunning = false;
      const c = this.ctx;
      c.fillStyle = 'rgba(0,0,0,0.8)';
      c.fillRect(0, 0, this.canvas.width, this.canvas.height);
      c.fillStyle = '#FFF'; c.textAlign = 'center';
      c.font = 'bold 32px Arial';
      c.fillText('GAME OVER', this.canvas.width/2, this.canvas.height/2 - 40);
      c.font = '24px Arial';
      c.fillText('Score: ' + Math.floor(this.score/10), this.canvas.width/2, this.canvas.height/2 + 20);
      c.font = '18px Arial';
      c.fillText('Tapa el botón para reiniciar', this.canvas.width/2, this.canvas.height/2 + 70);
    }

    restart() {
      this.score = 0; this.obstacles = []; this.obstacleTimer = 0; this.obstacleCooldown = 120;
      this.frame = 0; this.timer = 0; this.jumpFrame = 0; this.jumpTimer = 0;
      this.bgX = 0; this.mid1AX = 0; this.mid1BX = this.canvas.width; this.mid2X = 0; this.fgX = 0;
      this.player.x = 80; this.player.y = 0; this.player.vy = 0; this.player.jumping = false;
      this.gameRunning = true;
    }

    gameLoop() {
      this.update(); this.draw();
      requestAnimationFrame(() => this.gameLoop());
    }
  }

  window._game = new Game();
  window._game.gamePaused = false;
  </script>

  <script>
  const BTN = {
    zone:      { x:0.852, y:0.456, w:0.062, h:0.078 },
    threshold: 0.20,
    video: null, canvas: null, ctx: null,
    pressed: false, occludedFrames: 0, debounce: 3,
    cooldown: 300, lastFire: 0, running: false,

    init() {
      this.canvas = document.createElement('canvas');
      this.ctx    = this.canvas.getContext('2d');
      const find = () => {
        const vids = document.querySelectorAll('video');
        for (const v of vids) if (v.videoWidth > 0) return v;
        return null;
      };
      const tryStart = () => {
        this.video = find();
        if (!this.video) { setTimeout(tryStart, 300); return; }
        this.running = true;
        this.tick();
      };
      tryStart();
    },

    analyze() {
      const vw = this.video.videoWidth, vh = this.video.videoHeight;
      if (!vw || !vh) return 1;
      const sw = Math.round(vw * this.zone.w), sh = Math.round(vh * this.zone.h);
      const sx = Math.round(vw * this.zone.x), sy = Math.round(vh * this.zone.y);
      this.canvas.width = sw; this.canvas.height = sh;
      this.ctx.drawImage(this.video, sx, sy, sw, sh, 0, 0, sw, sh);
      const data = this.ctx.getImageData(0, 0, sw, sh).data;
      let blue = 0;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        if (b > 80 && b - r > 30 && b - g > 25 && r < 115 && g < 135) blue++;
      }
      return blue / (sw * sh);
    },

    tick() {
      if (!this.running) return;
      const presence = this.analyze();
      const occluded = presence < this.threshold;
      if (occluded) {
        this.occludedFrames++;
        if (this.occludedFrames >= this.debounce && !this.pressed) {
          const now = Date.now();
          if (now - this.lastFire > this.cooldown) {
            this.pressed = true; this.lastFire = now;
            const g = window._game;
            if (g) { if (!g.gameRunning) g.restart(); else g.jump(); }
          }
        }
      } else {
        this.occludedFrames = 0;
        if (this.pressed) this.pressed = false;
      }
      requestAnimationFrame(() => this.tick());
    },

    setZone(z)      { Object.assign(this.zone, z); },
    setThreshold(t) { this.threshold = t; },
    showDebug()     { document.getElementById('btn-debug').style.display = 'block'; },
    hideDebug()     { document.getElementById('btn-debug').style.display = 'none'; },
  };
  window.BTN = BTN;
  </script>

  <script>
  document.querySelector('a-scene').addEventListener('loaded', () => {
    const target   = document.querySelector('[mindar-image-target]');
    const statusEl = document.getElementById('status');

    target.addEventListener('targetFound', () => {
      statusEl.style.opacity = '0';
      if (window._game) window._game.gamePaused = false;
      if (!BTN.running) BTN.init();
      else BTN.running = true;
    });

    target.addEventListener('targetLost', () => {
      statusEl.style.opacity = '1';
      statusEl.textContent = '📷 Apunta la cámara al papel...';
      if (window._game) window._game.gamePaused = true;
      BTN.running = false;
    });
  });
  </script>

</body>
</html>
